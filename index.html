<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Course Chatbot</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h2>📚 Course Chatbot</h2>

    <label for="chapterSelect">Επίλεξε κεφάλαιο:</label>

    <select id="chapterSelect" onchange="loadChapter()">
      <option value="notes/chapter_rounding.json">
        Σφάλματα στρογγύλευσης
      </option>
    </select>

    <div id="chatbox"></div>

    <div class="input-area">
      <input
        id="userInput"
        placeholder="Ρώτησε κάτι από τις σημειώσεις..."
      />

      <button onclick="sendMessage('answer')">
        Απάντηση
      </button>

      <button onclick="sendMessage('hint')">
        Hint
      </button>

      <button onclick="sendMessage('steps')">
        Βήματα
      </button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="script.js"></script>

</body>
</html>
