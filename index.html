<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Course Chatbot</title>

  <link rel="stylesheet" href="style.css" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']]
      }
    };
  </script>

  <script
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>

<body>

  <div class="container">

    <h2>📚 Course Chatbot</h2>

    <div class="chapter-area">
      <label for="chapterSelect">Επίλεξε κεφάλαιο:</label>

      <select id="chapterSelect" onchange="loadChapter()">
        <option value="notes/chapter_rounding.json">
          Σφάλματα στρογγύλευσης
        </option>
      </select>
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
      <input
        id="userInput"
        placeholder="Ρώτησε κάτι από τις σημειώσεις..."
      />

      <button onclick="sendMessage('answer')">Απάντηση</button>
      <button onclick="sendAnswer()">Απάντηση</button>
      <button onclick="sendHint()">Hint</button>
      <button onclick="sendSteps()">Βήματα</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="script.js?v=7"></script>

</body>
</html>
